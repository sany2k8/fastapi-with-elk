filebeat.autodiscover:
  providers:
    - type: docker
      hints.enabled: true
      templates:
        # Match the exact -elk container so a sibling stack's "fastapi-app"
        # container doesn't get ingested here too
        - condition:
            contains:
              docker.container.name: "fastapi-app-elk"
          config:
            - type: container
              paths:
                - "/var/lib/docker/containers/${data.docker.container.id}/*.log"

processors:
  - add_docker_metadata:
      host: "unix:///var/run/docker.sock"

output.logstash:
  hosts: ["logstash:5044"]

logging.level: info
logging.to_files: false
logging.to_stderr: true