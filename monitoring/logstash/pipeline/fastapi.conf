input {
  beats {
    port => 5044
  }
}

filter {
  # Filebeat wraps the original log line as a string in [message]; parse it as JSON
  json {
    source => "message"
    target => "parsed"
  }

  # Promote parsed fields to the top level of the event so Kibana can filter
  # on `level`, `request_id`, `status_code`, ... without a `parsed.` prefix
  ruby {
    code => '
      parsed = event.get("parsed")
      if parsed.is_a?(Hash)
        parsed.each { |k, v| event.set(k, v) }
      end
    '
  }

  # Normalize the timestamp field structlog produced into Logstash's @timestamp
  date {
    match => ["timestamp", "ISO8601"]
    target => "@timestamp"
  }

  # Drop Filebeat/Docker metadata noise; keep [container][name] for filtering
  mutate {
    remove_field => [
      "message", "parsed", "agent", "ecs", "input", "log", "host", "timestamp",
      "docker", "[container][labels]", "[container][id]", "[container][image]", "stream"
    ]
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "fastapi-logs-%{+YYYY.MM.dd}"
  }

  # Uncomment while debugging your pipeline
  # stdout { codec => rubydebug }
}